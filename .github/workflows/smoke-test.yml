name: Smoke test post-deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Render deploy (90s)
        run: sleep 90

      - name: Check /health endpoint
        id: health
        run: |
          URL="${BOT_URL:-https://signaturesb-bot-s272.onrender.com}/health"
          echo "→ GET $URL"
          HTTP=$(curl -s -o /tmp/health.json -w "%{http_code}" --max-time 30 "$URL")
          echo "HTTP $HTTP"
          cat /tmp/health.json | head -20
          if [ "$HTTP" != "200" ]; then
            echo "::error::Health check failed HTTP $HTTP"
            exit 1
          fi
          STATUS=$(jq -r '.status' /tmp/health.json)
          TOOLS=$(jq -r '.tools' /tmp/health.json)
          if [ "$STATUS" != "ok" ]; then
            echo "::error::status=$STATUS (expected ok)"
            exit 1
          fi
          if [ "$TOOLS" -lt 30 ]; then
            echo "::error::tools=$TOOLS (expected ≥30)"
            exit 1
          fi
          echo "✅ Deploy verified: status=ok, tools=$TOOLS"

      - name: Open issue if health fails
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha.substring(0, 7);
            const msg = require('fs').readFileSync('/tmp/health.json', 'utf8').slice(0, 500).replace(/`/g, '\\`');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Deploy ${sha} failed smoke test`,
              body: [
                '**Automatic alert from smoke-test.yml**',
                '',
                `Commit: ${context.sha}`,
                `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                '',
                '**Health response excerpt:**',
                '```json',
                msg,
                '```',
                '',
                '**Actions suggérées:**',
                '- `npm run diagnose` en local pour investiguer',
                '- Vérifier les logs Render: https://dashboard.render.com',
                '- Rollback manuel si nécessaire: Render Dashboard > Deploys > Rollback',
              ].join('\n'),
              labels: ['incident', 'automated'],
            });

name: Kira Keepalive

on:
  schedule:
    - cron: '*/5 * * * *'   # Toutes les 5 minutes
  workflow_dispatch:         # Déclenchement manuel si besoin

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Kira
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://kira-bot-vsmi.onrender.com/)
          echo "Status HTTP: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "⚠️ Kira ne répond pas (HTTP $STATUS) — Render va redémarrer automatiquement"
            exit 1
          fi
          echo "✅ Kira vivante"

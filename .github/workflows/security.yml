name: Security

on:
  push:
    branches: [main]
    paths-ignore:
      - 'BOT_STATUS.md'
      - 'BOT_ACTIVITY.md'
      - 'BOOT_REPORT.md'
      - 'SESSION_LIVE.md'
      - '**/*.md'
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 9 * * 1'  # Lundi 9h UTC — scan hebdo automatique

permissions:
  contents: read
  security-events: write

jobs:
  gitleaks:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_ENABLE_COMMENTS: true

  validate:
    name: Validate bot.js
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Syntax + validations
        run: node validate.js

  audit:
    name: npm audit — vulnérabilités dépendances
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci --ignore-scripts
      - name: Audit high/critical
        run: npm audit --audit-level=high
        continue-on-error: false

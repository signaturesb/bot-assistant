name: Lead Recovery Watchdog

# Surveille que le bot traite bien les leads:
# - Ping /health toutes les heures
# - Vérifie que pollerStats.lastRun est récent (<20min)
# - Vérifie qu'il n'y a pas de lowInfo élevé (lead extraction cassée)
# - Si anomalie détectée → GitHub issue auto + email via GitHub notifs

on:
  schedule:
    - cron: '0 * * * *'   # toutes les heures
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  watchdog:
    runs-on: ubuntu-latest
    steps:
      - name: Check /health + pollerStats
        id: check
        run: |
          URL="${BOT_URL:-https://signaturesb-bot-s272.onrender.com}/health"
          HTTP=$(curl -s -o /tmp/h.json -w "%{http_code}" --max-time 20 "$URL")
          if [ "$HTTP" != "200" ]; then
            echo "status=down" >> $GITHUB_OUTPUT
            echo "reason=HTTP $HTTP" >> $GITHUB_OUTPUT
            cat /tmp/h.json
            exit 0
          fi

          # Last poller run — doit être <30min (cron 5min = marge x6)
          LAST=$(jq -r '.gmail_poller.last_run // "none"' /tmp/h.json)
          if [ "$LAST" = "none" ] || [ "$LAST" = "null" ]; then
            echo "status=no_poller" >> $GITHUB_OUTPUT
            echo "reason=pollerStats.lastRun=null depuis boot" >> $GITHUB_OUTPUT
            exit 0
          fi
          LAST_EPOCH=$(date -d "$LAST" +%s 2>/dev/null || gdate -d "$LAST" +%s 2>/dev/null || echo 0)
          NOW=$(date +%s)
          AGE=$((NOW - LAST_EPOCH))
          echo "Poller dernier run: $LAST (age: ${AGE}s)"

          if [ "$AGE" -gt 1800 ]; then
            echo "status=poller_silent" >> $GITHUB_OUTPUT
            echo "reason=Poller silencieux depuis ${AGE}s (>30min)" >> $GITHUB_OUTPUT
            exit 0
          fi

          # LowInfo ratio — si >20% des emails scannés aboutissent en lowInfo = parser cassé
          LOWINFO=$(jq -r '.gmail_poller.stats.totalsLowInfo // 0' /tmp/h.json)
          FOUND=$(jq -r '.gmail_poller.stats.totalsFound // 0' /tmp/h.json)
          if [ "$FOUND" -gt 10 ] && [ "$LOWINFO" -gt 0 ]; then
            RATIO=$((100 * LOWINFO / FOUND))
            if [ "$RATIO" -gt 30 ]; then
              echo "status=parser_degraded" >> $GITHUB_OUTPUT
              echo "reason=LowInfo ratio ${RATIO}% (${LOWINFO}/${FOUND}) — parser probablement cassé" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi

          # Erreurs stats — si >5% des runs en erreur = système dégradé
          RUNS=$(jq -r '.gmail_poller.stats.runs // 0' /tmp/h.json)
          ERRORS=$(jq -r '.gmail_poller.stats.totalsErrors // 0' /tmp/h.json)
          if [ "$RUNS" -gt 20 ] && [ "$ERRORS" -gt 0 ]; then
            ERR_RATIO=$((100 * ERRORS / RUNS))
            if [ "$ERR_RATIO" -gt 20 ]; then
              echo "status=errors_high" >> $GITHUB_OUTPUT
              echo "reason=Erreur ratio ${ERR_RATIO}% (${ERRORS}/${RUNS})" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi

          echo "status=ok" >> $GITHUB_OUTPUT
          echo "✅ Bot + poller OK (scan age ${AGE}s, lowInfo ${LOWINFO}/${FOUND})"

      - name: Open issue if anomaly
        if: steps.check.outputs.status != 'ok'
        uses: actions/github-script@v9
        with:
          script: |
            const status = '${{ steps.check.outputs.status }}';
            const reason = '${{ steps.check.outputs.reason }}';
            const body = [
              `**Lead Recovery Watchdog — ${new Date().toISOString()}**`,
              '',
              `Status: \`${status}\``,
              `Détails: ${reason}`,
              '',
              '**Actions suggérées:**',
              status === 'down'           ? '- Bot injoignable → vérifier Render dashboard' :
              status === 'no_poller'      ? '- Poller jamais lancé → vérifier GMAIL_* env vars + logs boot' :
              status === 'poller_silent'  ? '- Poller silencieux → vérifier crash / refresh token Gmail' :
              status === 'parser_degraded'? '- Parser cassé → inspecter lead_parser.js, relancer tests `npm run test-parser`' :
              status === 'errors_high'    ? '- Erreurs fréquentes → consulter logs Render + `/poller` dans Telegram' :
              '- Investigation nécessaire',
              '',
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join('\n');

            // Chercher issue existante pour éviter doublon
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              labels: 'watchdog', state: 'open', per_page: 10,
            });
            const dup = existing.data.find(i => i.title.includes(status));
            if (dup) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: dup.number, body,
              });
              console.log(`Commented on existing issue #${dup.number}`);
            } else {
              const issue = await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: `🚨 Watchdog: ${status}`,
                body,
                labels: ['watchdog', 'automated', 'incident'],
              });
              console.log(`Created issue #${issue.data.number}`);
            }

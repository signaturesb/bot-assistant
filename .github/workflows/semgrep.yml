name: Semgrep — Patterns sécurité

on:
  push:
    branches: [main]
    paths:
      - '**/*.js'
      - '.github/workflows/semgrep.yml'
  pull_request:
    branches: [main]
    paths:
      - '**/*.js'
  schedule:
    - cron: '0 7 * * 1'  # Lundi 7h UTC — scan hebdo

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    name: Semgrep scan
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep:latest
    if: (github.actor != 'dependabot[bot]')
    steps:
      - uses: actions/checkout@v6
      - name: Run Semgrep
        run: |
          semgrep ci \
            --config "p/javascript" \
            --config "p/nodejs" \
            --config "p/owasp-top-ten" \
            --config "p/security-audit" \
            --config "p/secrets" \
            --sarif --output=semgrep.sarif \
            --severity ERROR --severity WARNING || EXIT=$?
          echo "Semgrep exit: ${EXIT:-0}"
          # ne fail le job que sur findings ERROR (pas WARNING)
          if [ "${EXIT:-0}" = "1" ]; then exit 1; fi
        env:
          SEMGREP_RULES: p/javascript p/nodejs p/owasp-top-ten p/security-audit p/secrets
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
        continue-on-error: true

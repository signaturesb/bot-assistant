name: CodeQL

on:
  push:
    branches: [main]
    paths:
      - '**/*.js'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    branches: [main]
    paths:
      - '**/*.js'
      - 'package.json'
      - 'package-lock.json'
  schedule:
    - cron: '0 6 * * 1'  # Lundi 6h UTC — scan hebdo

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze JavaScript
    # Skip on private repos (CodeQL requires GitHub Advanced Security, payant sur privés)
    if: github.event.repository.visibility == 'public' || github.repository == 'signaturesb/kira-bot'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3
        with:
          category: /language:${{ matrix.language }}
